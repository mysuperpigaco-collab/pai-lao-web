<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e"/>
      <stop offset="100%" style="stop-color:#134e4a"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#0f766e;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="200" cy="150" r="180" fill="rgba(255,255,255,0.04)"/>
  <circle cx="1050" cy="650" r="220" fill="rgba(255,255,255,0.04)"/>
  <circle cx="600" cy="400" r="300" fill="rgba(255,255,255,0.02)"/>

  <!-- Mountains / landscape silhouette -->
  <path d="M0,600 L200,320 L380,480 L560,260 L740,420 L920,200 L1100,380 L1200,300 L1200,800 L0,800 Z"
    fill="rgba(0,0,0,0.25)"/>
  <path d="M0,700 L300,480 L500,580 L700,420 L900,520 L1200,380 L1200,800 L0,800 Z"
    fill="rgba(0,0,0,0.18)"/>

  <!-- Sun/moon -->
  <circle cx="600" cy="280" r="70" fill="rgba(255,255,255,0.12)"/>
  <circle cx="600" cy="280" r="52" fill="rgba(255,255,255,0.18)"/>

  <!-- Trees -->
  <polygon points="160,600 180,520 200,600" fill="rgba(255,255,255,0.12)"/>
  <polygon points="180,600 200,490 220,600" fill="rgba(255,255,255,0.10)"/>
  <polygon points="980,600 1000,510 1020,600" fill="rgba(255,255,255,0.12)"/>
  <polygon points="960,610 980,530 1000,610" fill="rgba(255,255,255,0.08)"/>

  <!-- Stars -->
  <circle cx="300" cy="120" r="3" fill="rgba(255,255,255,0.6)"/>
  <circle cx="450" cy="80" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="750" cy="100" r="3" fill="rgba(255,255,255,0.55)"/>
  <circle cx="900" cy="60" r="2" fill="rgba(255,255,255,0.45)"/>
  <circle cx="150" cy="200" r="2" fill="rgba(255,255,255,0.4)"/>
  <circle cx="1050" cy="150" r="3" fill="rgba(255,255,255,0.5)"/>

  <!-- PAI-LAO branding text -->
  <text x="600" y="710"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="28"
    font-weight="700"
    fill="rgba(255,255,255,0.35)"
    text-anchor="middle"
    letter-spacing="6">ไปเล่า · PAI-LAO</text>
</svg>
