<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Create Superadmin — ไปเล่า</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f172a; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 32px; width: 100%; max-width: 440px; }
  h1 { color: #f1f5f9; font-size: 1.2rem; margin-bottom: 6px; }
  p  { color: #64748b; font-size: 0.82rem; margin-bottom: 24px; }
  label { display: block; color: #94a3b8; font-size: 0.78rem; margin-bottom: 5px; margin-top: 14px; }
  input { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 9px 12px; color: #f1f5f9; font-size: 0.88rem; outline: none; }
  input:focus { border-color: #4facfe; }
  button { margin-top: 22px; width: 100%; padding: 12px; background: linear-gradient(to right, #4facfe, #43e97b); border: none; border-radius: 10px; color: #0f172a; font-weight: 700; font-size: 0.95rem; cursor: pointer; }
  button:disabled { opacity: 0.5; cursor: default; }
  .msg { margin-top: 16px; padding: 12px 14px; border-radius: 8px; font-size: 0.82rem; display: none; }
  .msg.ok  { background: #14402a; color: #6ee7b7; display: block; }
  .msg.err { background: #450a0a; color: #fca5a5; display: block; }
</style>
</head>
<body>
<div class="card">
  <h1>⚡ สร้าง Superadmin</h1>
  <p>ใช้ครั้งเดียวเพื่อสร้างบัญชี Superadmin คนแรก</p>

  <label>Site URL (เช่น https://pai-lao-web.vercel.app)</label>
  <input id="siteUrl" type="text" value="https://pai-lao-web.vercel.app" placeholder="https://..." />

  <label>Seed Secret (ที่ตั้งใน Vercel env)</label>
  <input id="secret" type="password" placeholder="PaiLaoAdmin2025" />

  <label>First Name</label>
  <input id="firstName" type="text" value="Admin" />

  <label>Last Name</label>
  <input id="lastName" type="text" value="PaiLao" />

  <label>Username</label>
  <input id="username" type="text" value="superadmin" />

  <label>Email</label>
  <input id="email" type="email" value="mysuperpigaco@gmail.com" />

  <label>Phone</label>
  <input id="phone" type="text" value="0800000000" />

  <label>Password (รหัสผ่านสำหรับ login)</label>
  <input id="password" type="password" placeholder="ตั้งรหัสผ่านที่ต้องการ" />

  <button id="btn" onclick="doSeed()">สร้าง Superadmin</button>
  <div class="msg" id="msg"></div>
</div>

<script>
async function doSeed() {
  const btn = document.getElementById("btn");
  const msg = document.getElementById("msg");
  msg.className = "msg";
  msg.textContent = "";

  const siteUrl  = document.getElementById("siteUrl").value.trim().replace(/\/$/, "");
  const secret   = document.getElementById("secret").value.trim();
  const firstName= document.getElementById("firstName").value.trim();
  const lastName = document.getElementById("lastName").value.trim();
  const username = document.getElementById("username").value.trim();
  const email    = document.getElementById("email").value.trim();
  const phone    = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value;

  if (!siteUrl || !secret || !firstName || !lastName || !username || !email || !phone || !password) {
    msg.className = "msg err"; msg.textContent = "❌ กรุณากรอกข้อมูลให้ครบทุกช่อง"; return;
  }

  btn.disabled = true; btn.textContent = "กำลังสร้าง...";

  try {
    const res = await fetch(siteUrl + "/api/admin/seed", {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-Seed-Secret": secret },
      body: JSON.stringify({ firstName, lastName, username, email, phone, password }),
    });
    const data = await res.json();
    if (res.ok) {
      msg.className = "msg ok";
      msg.textContent = "✅ " + data.message + " — ไปที่ " + siteUrl + "/login แล้ว login ด้วย email + password ที่ตั้งไว้ จากนั้นไปที่ /admin ได้เลย";
    } else {
      msg.className = "msg err";
      msg.textContent = "❌ " + (data.message || "เกิดข้อผิดพลาด");
    }
  } catch (e) {
    msg.className = "msg err";
    msg.textContent = "❌ เชื่อมต่อไม่ได้: " + e.message;
  }

  btn.disabled = false; btn.textContent = "สร้าง Superadmin";
}
</script>
</body>
</html>
